<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FocusTabs Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="container">
    <h1>FocusTabs Settings</h1>

    <section>
      <label for="model-select">AI Model</label>
      <select id="model-select">
        <optgroup label="OpenAI — Latest">
          <option value="gpt-5">GPT-5 (most capable)</option>
          <option value="gpt-5-mini">GPT-5 Mini (faster, cheaper)</option>
        </optgroup>
        <optgroup label="OpenAI — Previous">
          <option value="gpt-4o">GPT-4o</option>
          <option value="gpt-4o-mini">GPT-4o Mini</option>
        </optgroup>
        <optgroup label="Anthropic">
          <option value="claude-sonnet-4">Claude Sonnet 4</option>
        </optgroup>
        <optgroup label="Google">
          <option value="gemini-pro">Gemini Pro</option>
        </optgroup>
      </select>
    </section>

    <section>
      <label for="api-key">API Key</label>
      <input
        type="password"
        id="api-key"
        placeholder="sk-... / sk-ant-... / AIza..."
        autocomplete="off"
        spellcheck="false"
      />
      <p class="hint">
        Your key is stored locally on this device only and never sent anywhere except directly to the AI provider.
      </p>
    </section>

    <section>
      <label>
        <input type="checkbox" id="ai-enabled" checked />
        Use AI for tab analysis
      </label>
    </section>

    <section>
      <label>
        <input type="checkbox" id="auto-prompt-enabled" />
        Auto-open FocusTabs prompt when tabs reach 5+
      </label>
    </section>

    <section>
      <label for="user-context">About You / Work Context (used in AI prompts)</label>
      <textarea
        id="user-context"
        rows="5"
        placeholder="Example: I'm a PM working on Q3 roadmap, prioritizing product docs, customer feedback, and sprint planning."
      ></textarea>
    </section>

    <button id="save-btn">Save Settings</button>
    <p class="status hidden" id="status">✓ Saved</p>
    <p class="error hidden" id="error-msg"></p>
  </div>
  <script src="settings.js"></script>
</body>
</html>
